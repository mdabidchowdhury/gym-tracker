<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #bb86fc; --text: #ffffff; --text-muted: #aaaaaa; --border: #333333;}
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 80px; -webkit-tap-highlight-color: transparent;}
        
        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 2em;}
        
        .day-selector { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .day-selector::-webkit-scrollbar { display: none; }
        .day-btn { background: var(--card); color: var(--text-muted); padding: 10px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-weight: 600; font-size: 0.95em; transition: 0.2s;}
        .day-btn.active { background: var(--primary); color: #121212; box-shadow: 0 0 10px rgba(187, 134, 252, 0.4); }
        
        .exercise-card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ex-title { font-size: 1.15em; font-weight: 700; margin: 0 0 4px 0; letter-spacing: 0.5px;}
        .ex-reps { color: var(--text-muted); font-size: 0.9em; margin: 0; }
        
        .sets-container { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap;}
        .set-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.1em; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease-in-out; background: #2a2a2a;}
        .set-circle.completed { background: var(--primary); border-color: var(--primary); color: #121212; font-weight: bold; transform: scale(1.05);}
        
        /* Advanced Calendar Styles */
        .advanced-calendar { background: var(--card); border-radius: 16px; margin-top: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid var(--border); overflow: hidden;}
        .adv-cal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px 20px; }
        .adv-cal-title { font-size: 1.1em; font-weight: 700; margin: 0; }
        .adv-cal-nav { display: flex; gap: 15px; }
        .nav-arrow { background: transparent; border: none; color: var(--text); font-size: 1.2em; cursor: pointer; padding: 0 5px;}
        
        .adv-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; padding: 10px 20px; }
        .adv-day-name { font-size: 0.8em; color: var(--text-muted); padding-bottom: 10px; font-weight: 500;}
        .adv-day-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40px; font-size: 0.95em; position: relative; color: var(--text-muted);}
        .adv-day-cell.current-month { color: var(--text); }
        .adv-day-cell.today-ring .date-num { border: 2px solid var(--primary); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        
        /* Indicators */
        .indicator-dot { width: 4px; height: 4px; background-color: var(--primary); border-radius: 50%; position: absolute; bottom: 2px; }
        .indicator-line { width: 14px; height: 2px; background-color: var(--primary); border-radius: 2px; position: absolute; bottom: 2px; }
        
        .adv-legend { display: flex; gap: 20px; padding: 15px 20px; font-size: 0.85em; color: var(--text-muted); border-bottom: 1px solid var(--border); align-items: center;}
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 5px; height: 5px; background-color: var(--primary); border-radius: 50%; }
        .legend-line { width: 12px; height: 2px; background-color: var(--primary); border-radius: 2px; }
        
        .adv-stats { display: flex; justify-content: space-between; padding: 20px; }
        .stat-block { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.4em; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .stat-label { font-size: 0.75em; color: var(--text-muted); max-width: 70px; line-height: 1.2;}
        .stats-header { padding: 15px 20px 0 20px; font-size: 0.9em; font-weight: 600; color: var(--text-muted);}
    </style>
</head>
<body>
    <div class="header">
        <h1>Tracker</h1>
        <p id="current-date" style="color: var(--text-muted); margin-top: 5px; font-size: 0.9em;"></p>
    </div>
    
    <div class="day-selector" id="day-selector"></div>
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px;">
        <h2 id="muscle-group" style="margin: 0; font-weight: 600; font-size: 1.3em; color: #e0e0e0;"></h2>
    </div>
    
    <div id="workout-list"></div>

    <!-- Advanced Calendar Widget -->
    <div class="advanced-calendar">
        <div class="adv-cal-header">
            <p class="adv-cal-title" id="adv-month-year">June 2026</p>
            <div class="adv-cal-nav">
                <button class="nav-arrow" onclick="changeMonth(-1)">&#8249;</button>
                <button class="nav-arrow" onclick="changeMonth(1)">&#8250;</button>
            </div>
        </div>
        
        <div class="adv-cal-grid" id="adv-cal-grid">
            <div class="adv-day-name">Mo</div><div class="adv-day-name">Tu</div><div class="adv-day-name">We</div>
            <div class="adv-day-name">Th</div><div class="adv-day-name">Fr</div><div class="adv-day-name">Sa</div><div class="adv-day-name">Su</div>
            <!-- Grid generated by JS -->
        </div>
        
        <div class="adv-legend">
            <div class="legend-item"><div class="legend-dot"></div> 1+ sets done</div>
            <div class="legend-item"><div class="legend-line"></div> All sets done</div>
        </div>
        
        <div class="stats-header">Last 4 weeks</div>
        <div class="adv-stats">
            <div class="stat-block">
                <span class="stat-val" id="stat-workouts">0</span>
                <span class="stat-label">Workouts completed</span>
            </div>
            <div class="stat-block">
                <span class="stat-val" id="stat-sets">0</span>
                <span class="stat-label">Sets completed</span>
            </div>
            <div class="stat-block">
                <span class="stat-val" id="stat-streak">0</span>
                <span class="stat-label">Current Streak</span>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        
        const routines = [
            { id: 0, name: "Sun", full: "Sunday", muscle: "Chest", exercises: [ {name: "Push Ups", reps: "Failure", sets: 3}, {name: "Bench Presses", reps: "10-12 reps", sets: 3}, {name: "Incline DB Presses", reps: "10-12 reps", sets: 3}, {name: "Cable Crossovers", reps: "12 reps", sets: 3} ]},
            { id: 1, name: "Mon", full: "Monday", muscle: "Back", exercises: [ {name: "Deadlifts", reps: "8-10 reps", sets: 3}, {name: "Chin Up's", reps: "10-12 reps", sets: 3}, {name: "Lat Pull Downs", reps: "10-12 reps", sets: 3}, {name: "Seated Row's", reps: "12 reps", sets: 3} ]},
            { id: 2, name: "Tue", full: "Tuesday", muscle: "Legs", exercises: [ {name: "Squats", reps: "10-12 reps", sets: 3}, {name: "Angled Leg Presses", reps: "10-12 reps", sets: 3}, {name: "Leg Extension's", reps: "12 reps", sets: 3}, {name: "Leg Curls", reps: "12 reps", sets: 3} ]},
            { id: 3, name: "Wed", full: "Wednesday", muscle: "Shoulders", exercises: [ {name: "Seated DB Presses", reps: "10-12 reps", sets: 3}, {name: "Lateral Raises", reps: "12-15 reps", sets: 3}, {name: "Front Raises", reps: "12 reps", sets: 3}, {name: "Back Presses", reps: "12 reps", sets: 3} ]},
            { id: 4, name: "Thu", full: "Thursday", muscle: "Arms", exercises: [ {name: "Triceps Dip's", reps: "10-12 reps", sets: 3}, {name: "Barbell Curl's", reps: "10-12 reps", sets: 3}, {name: "Triceps Pushdown", reps: "12 reps", sets: 3}, {name: "Hammer Curl's", reps: "12 reps", sets: 3} ]},
            { id: 5, name: "Fri", full: "Friday", muscle: "Rest Day", exercises: [] },
            { id: 6, name: "Sat", full: "Saturday", muscle: "Rest Day", exercises: [] }
        ];

        let displayDate = new Date(); // Controls calendar month view
        const actualToday = new Date();
        let selectedDayId = actualToday.getDay(); // Controls which workout is shown above
        
        // Structure: { "2026-06-01": { setsDone: 5, totalSets: 12, isFull: false } }
        let historyData = JSON.parse(localStorage.getItem('gymDailyData')) || {};

        function getLocalISODate(date) {
            const offset = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - offset).toISOString().split('T')[0];
        }

        const todayStr = getLocalISODate(actualToday);

        function init() {
            document.getElementById('current-date').innerText = actualToday.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            renderDays();
            renderWorkout(selectedDayId);
            renderCalendar();
            calculateStats();
        }

        function renderDays() {
            const container = document.getElementById('day-selector');
            container.innerHTML = '';
            routines.forEach(day => {
                const btn = document.createElement('div');
                btn.className = `day-btn ${day.id === selectedDayId ? 'active' : ''}`;
                btn.innerText = day.name;
                btn.onclick = () => {
                    selectedDayId = day.id;
                    renderDays();
                    renderWorkout(selectedDayId);
                };
                container.appendChild(btn);
            });
            const activeBtn = container.querySelector('.active');
            if(activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function renderWorkout(dayId) {
            const routine = routines.find(r => r.id === dayId);
            document.getElementById('muscle-group').innerText = routine.muscle;
            const list = document.getElementById('workout-list');
            list.innerHTML = '';

            if (routine.exercises.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-size: 1.05em; background: var(--card); border-radius: 16px;">Rest day. Enjoy the recovery.</div>`;
                return;
            }

            // Only load checkboxes if viewing today's actual scheduled workout to prevent messing up history
            const isToday = (dayId === actualToday.getDay());
            let currentDayData = historyData[todayStr] || { setsDone: 0, totalSets: getDailyTotalSets(dayId), isFull: false, checkedKeys: [] };

            routine.exercises.forEach((ex, exIndex) => {
                let setsHtml = '';
                for(let i=1; i<=ex.sets; i++) {
                    const key = `${exIndex}-${i}`;
                    const isDone = currentDayData.checkedKeys && currentDayData.checkedKeys.includes(key);
                    
                    if(isToday) {
                        setsHtml += `<div class="set-circle ${isDone ? 'completed' : ''}" onclick="toggleSet(${dayId}, '${key}', this)">${i}</div>`;
                    } else {
                        setsHtml += `<div class="set-circle" style="opacity: 0.5; cursor: default;">${i}</div>`;
                    }
                }

                list.innerHTML += `
                    <div class="exercise-card">
                        <div class="ex-header"><div><p class="ex-title">${ex.name}</p><p class="ex-reps">${ex.sets} Sets • ${ex.reps}</p></div></div>
                        <div class="sets-container">${setsHtml}</div>
                    </div>
                `;
            });
            
            if(!isToday) {
                list.innerHTML += `<p style="text-align:center; color: var(--text-muted); font-size: 0.8em;">Checkboxes are locked. You can only track sets for today's date.</p>`;
            }
        }

        function getDailyTotalSets(dayId) {
            const routine = routines.find(r => r.id === dayId);
            return routine.exercises.reduce((sum, ex) => sum + ex.sets, 0);
        }

        function toggleSet(dayId, key, element) {
            let data = historyData[todayStr] || { setsDone: 0, totalSets: getDailyTotalSets(dayId), isFull: false, checkedKeys: [] };
            
            if (!data.checkedKeys) data.checkedKeys = [];

            if (data.checkedKeys.includes(key)) {
                data.checkedKeys = data.checkedKeys.filter(k => k !== key);
                element.classList.remove('completed');
            } else {
                data.checkedKeys.push(key);
                element.classList.add('completed');
                if (navigator.vibrate) navigator.vibrate(50);
            }

            data.setsDone = data.checkedKeys.length;
            data.isFull = (data.setsDone >= data.totalSets && data.totalSets > 0);
            
            historyData[todayStr] = data;
            localStorage.setItem('gymDailyData', JSON.stringify(historyData));
            
            renderCalendar();
            calculateStats();
        }

        function changeMonth(offset) {
            displayDate.setMonth(displayDate.getMonth() + offset);
            renderCalendar();
        }

        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('adv-month-year').innerText = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('adv-cal-grid');
            // Keep headers, clear days
            grid.innerHTML = `
                <div class="adv-day-name">Mo</div><div class="adv-day-name">Tu</div><div class="adv-day-name">We</div>
                <div class="adv-day-name">Th</div><div class="adv-day-name">Fr</div><div class="adv-day-name">Sa</div><div class="adv-day-name">Su</div>
            `;

            // Adjust first day to start on Monday (0=Mon, ..., 6=Sun)
            let firstDayIndex = new Date(year, month, 1).getDay() - 1;
            if (firstDayIndex === -1) firstDayIndex = 6; 

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();

            // Previous month overflow days
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                grid.innerHTML += `<div class="adv-day-cell">${prevMonthDays - i}</div>`;
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = getLocalISODate(new Date(year, month, day));
                const isToday = (dateStr === todayStr);
                let classes = "adv-day-cell current-month";
                if (isToday) classes += " today-ring";
                
                let indicatorHtml = '';
                const dayData = historyData[dateStr];
                
                if (dayData && dayData.setsDone > 0) {
                    if (dayData.isFull) {
                        indicatorHtml = `<div class="indicator-line"></div>`;
                    } else {
                        indicatorHtml = `<div class="indicator-dot"></div>`;
                    }
                }

                grid.innerHTML += `<div class="${classes}"><span class="date-num">${day}</span>${indicatorHtml}</div>`;
            }
        }

        function calculateStats() {
            let totalWorkouts = 0;
            let totalSets = 0;
            let currentStreak = 0;
            
            // Loop over past 28 days
            for (let i = 0; i < 28; i++) {
                const d = new Date(actualToday);
                d.setDate(d.getDate() - i);
                const dateStr = getLocalISODate(d);
                const dayId = d.getDay();
                const dayData = historyData[dateStr];
                
                const isRestDay = (dayId === 5 || dayId === 6); // Fri, Sat
                
                if (dayData) {
                    totalSets += dayData.setsDone;
                    if (dayData.isFull) totalWorkouts++;
                }

                // Streak Calculation (stops counting if a required workout day was missed)
                if (i === 0 && (!dayData || !dayData.isFull) && !isRestDay) {
                    // Missed today, streak is 0 unless it's a rest day
                } else {
                    if (dayData && dayData.isFull) {
                        currentStreak++;
                    } else if (isRestDay) {
                        currentStreak++; // Rest days don't break streaks
                    } else if (i > 0) {
                        break; // Streak broken on a past lifting day
                    }
                }
            }
            
            document.getElementById('stat-workouts').innerText = totalWorkouts;
            document.getElementById('stat-sets').innerText = totalSets;
            document.getElementById('stat-streak').innerText = currentStreak;
        }

        init();
    </script>
</body>
</html>
